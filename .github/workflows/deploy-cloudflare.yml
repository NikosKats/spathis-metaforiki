name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - claude/deploy-cloudflare-rkP12
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy web (OpenNext on Cloudflare Workers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://spathismetaforiki.gr' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL || 'no-reply@spathismetaforiki.gr' }}
      ADMIN_NOTIFICATION_EMAIL: ${{ vars.ADMIN_NOTIFICATION_EMAIL || 'aspathis@hotmail.gr' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build (OpenNext for Cloudflare)
        run: pnpm build:cf

      - name: Deploy with Wrangler
        run: pnpm exec wrangler deploy

  deploy-redirect-worker:
    name: Deploy redirect worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: redirect-worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: redirect-worker/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Deploy with Wrangler
        # Routes bind only once the metaforikikefalonias.gr zone is added on
        # Cloudflare. If the zone isn't there yet, this step will fail with a
        # route validation error — that's expected on first run.
        run: pnpm exec wrangler deploy
        continue-on-error: true
